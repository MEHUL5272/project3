<!--javacripat program to count total number of even and odd elements in an array-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var arr = [5, 6, 4, 12, 19, 121, 1, 7, 9, 63];
        var n = 10;
        var even = 0;
        var odd = 0;

        for(var i = 0; i < n; i++)
        {
            if(arr[i] % 2 == 0)
            {
                even++;
            }
            else
            {
                odd++;
            }
        }

        document.write("Total even elements:- ", even, "<br>");
        document.write("Total odd elements:- ", odd);

    </script>

</body>
</html>
