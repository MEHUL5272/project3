<!-- JavaScript program to insert an element in an array. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<script>
    var arr = [5, 6, 4, 12, 19, 121, 1, 7, 9, 63];
    var n = 10;

    var pos = 3;   
    var num = 25;  

    if (pos > n + 1 || pos <= 0)
    {
        document.write(n);
    }
    else
    {
        for (var i = n; i >= pos; i--)
        {
            arr[i] = arr[i - 1];
        }

        arr[pos - 1] = num;
        n++;

        for (var i = 0; i < n; i++)
        {
            document.write(arr[i] + " ");
        }
    }
</script>

</body>
</html>
