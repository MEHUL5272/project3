<!--javacripat program to print all negative elements in array-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var arr = [-10, -20, -5, 30, 45, 60, -45];
        var n = 7;

        for(var i = 0; i < 7; i++)
        {
            if(arr[i] < 0)
            {
                document.write(arr[i] + "<br>"); 
            } 
        }
    </script>
</body>
