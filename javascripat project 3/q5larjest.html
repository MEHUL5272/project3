<!--javacripat program to find second largest number in an array-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var arr = [7, 2, 3, 8, 6, 5, 75, 38, 3, 2];
        var n = 10;
        var max1 = Number.MIN_SAFE_INTEGER;
        var max2 = Number.MIN_SAFE_INTEGER;


        for(var i=0; i < n; i++)
        {
            if(arr[i] > max1)
            {
                max2 = max1;
                max1 = arr[i];
            }
            else if(arr[i] > max2 && arr[i] < max1)
            {
                
                max2 = arr[i];
            }
        }

        document.write("First largest:- ", max1, "<br>");
        document.write("Second largest:- ", max2, "<br>");

    </script>

</body>
</html>
